<!DOCTYPE html>
<html>
    <body>
    <script>
        let a =parseInt(window.prompt("Please enter your age:"));
        if (a < 18) {
            console.info("You are a minor , not eligible to vote.");
        } else if (a >= 18 && a < 65) {
            console.info("You are an adult , eligible to vote.");
        } else {
            console.info("You are a senior citizen , eligible to vote.");
        }
    </script>
    </body>
    </html>
