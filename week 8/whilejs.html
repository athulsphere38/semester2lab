<!DOCTYPE html>
<html>
    <body>
        <script>
             let a =parseInt(window.prompt("Please enter your attendance percentage:"));
            while (a < 0 || a > 100) {
                a = parseInt(window.prompt("Invalid input. Please enter a valid attendance percentage (0-100):"));
            }
            if(a >= 75) {
                window.alert("You have above 75% attendance, you are eligible to write the exam");
            } else {
                window.alert("You have below 75% attendance, you are not eligible to write the exam");
            }
        </script>
    </body>
</html>
