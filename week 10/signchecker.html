<!DOCTYPE html>
<html>
<head>
    <title>Sign Checker</title>
    <h1>PRODUCT SIGN CHECKER</h1>
    <script>
        function findSign() {
            let a = parseFloat(prompt("Enter first number:"));
            let b = parseFloat(prompt("Enter second number:"));
            let c = parseFloat(prompt("Enter third number:"));

            let product = a * b * c;

            if (product > 0) {
                alert("The sign is +");
            } 
            else if (product < 0) {
                alert("The sign is -");
            } 
            else {
                alert("The sign is 0");
            }
        }
    </script>
    </head>
<body style="background-color: rgb(187, 226, 71); text-align: center; font-family: 'Times New Roman', Times, serif;">
    <button onclick="findSign()">Check Sign of Product</button>
</body>
</html>
