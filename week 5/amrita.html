<!doctype html>
<html>
<head>
<title>Amrita Campus Login | CSE25009--Athul Krishna A</title>

<style>
html, body{
    margin:0;
    height:100%;
    font-family:Arial;
    background-color:#a9445b;
}

body{
    display:flex;
    flex-direction:column;
    min-height:100vh;
}

.header{
    flex-shrink:0;
    background:#7a1f33;
    color:white;
    padding:5px 20px;
    text-align:center;
}

.main-wrapper{
    display:flex;
    flex-wrap:wrap;
    align-items:flex-start;
    gap:15px;
    padding:15px;
    flex:1;
    min-height:0;
    overflow:auto;
}

.campus-section{
    padding:10px;
    display:flex;
    flex-direction:column;
    flex-wrap:wrap;
    gap:12px;
    flex:1 1 280px;
    min-width:200px;
}

.card{
    border-radius:10px;
    overflow:hidden;
    position:relative;
}

.card a{
    display:block;
    position:relative;
    text-decoration:none;
    color:white;
}

.card a::before{
    content:'';
    position:absolute;
    top:0;
    left:0;
    right:0;
    height:100px;
    background:rgba(0,0,0,0.45);
    pointer-events:none;
    z-index:1;
}

.card img{
    width:100%;
    height:100px;
    object-fit:cover;
    display:block;
}

.overlay{
    position:absolute;
    top:50px;
    left:50%;
    transform:translate(-50%, -50%);
    padding:8px;
    font-weight:bold;
    z-index:2;
    width:100%;
    box-sizing:border-box;
    text-align:center;
}

iframe{
    flex:1 1 400px;
    min-width:280px;
    height:calc(6 * 100px + 5 * 12px + 2 * 10px);
    border:none;
    border-radius:10px;
    background:white;
    overflow:hidden;
}
</style>
</head>

<body>

<div class="header">
    <h1>Amrita Vishwa Vidyapeetham</h1>
    <p>Campus Login Portal | CSE25009--Athul Krishna A</p>
</div>

<div class="main-wrapper">
<div class="campus-section">

    <div class="card">
        <a href="coimbatore-login.html" target="loginFrame">
            <img src="coimbatore.jpg.jpeg">
            <div class="overlay">Coimbatore</div>
        </a>
    </div>

    <div class="card">
        <a href="bangalore-login.html" target="loginFrame">
            <img src="banglore.jpg.jpeg">
            <div class="overlay">Bangalore</div>
        </a>
    </div>

    <div class="card">
        <a href="amritapuri-login.html" target="loginFrame">
            <img src="amritapuri.jpg.jpeg">
            <div class="overlay">Amritapuri</div>
        </a>
    </div>

    <div class="card">
        <a href="chennai-login.html" target="loginFrame">
            <img src="chennai.jpg.jpeg">
            <div class="overlay">Chennai</div>
        </a>
    </div>

    <div class="card">
        <a href="amaravati-login.html" target="loginFrame">
            <img src="amaravati.jpg.jpeg">
            <div class="overlay">Amaravati</div>
        </a>
    </div>

    <div class="card">
        <a href="kochi-login.html" target="loginFrame">
            <img src="kochi.jpg.jpeg">
            <div class="overlay">Kochi</div>
        </a>
    </div>

</div>

<iframe name="loginFrame"></iframe>
</div>

</body>
</html>
