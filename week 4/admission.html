<!DOCTYPE html>
<html>
    <head>
        <title> college admission</title>
    </head>
    <body style="background-color: rgb(235, 235, 235);">
       <h2 style="text-align: center;">COLLEGE ADMISSION REGISTRATION</h2>
       <table width="800px" height="700px" border="1"style="margin: auto;">
         <tr>
            <td>Full Name:</td>
            <td><label for="fullname"></label>
            <input style="align-items: center;" type="text" id="fullname"></td>
         </tr>
          <tr>
            <td>Email:</td>
            <td><label for="email"></label>
            <input style="align-items: center;" type="text" id="email"></td>
         </tr>
          <tr>
            <td>Phone Number:</td>
            <td><label for="phone"></label>
            <input style="align-items: center;" width="" type="text" id="phone"></td>
         </tr>
         <tr>
            <td>Gender:</td>
            <td><label for="gender"></label>
            <input style="align-items: center;" type="radio" name="Gender" value="Male">Male<br>
            <input style="align-items: center;" type="radio" name="Gender" value="Female">Female<br>
            <input style="align-items: center;" type="radio" name="Gender" value="Other">Other<br><br>
            </td>
         </tr>
            <tr>
                <td>Course Applying for:</td>
                <td><label for="course"></label>
                <select id="course">
                    <option value="Computer Science"> Btech Computer Science</option>
                    <option value="Electrical Engineering"> Btech Electrical Engineering</option>
                    <option value="Mechanical Engineering">Btech Mechanical Engineering</option>
                    <option value="Civil Engineering">Btech Civil Engineering</option>
                </select></td>
            </tr>
            <tr>
                <td>Hobbies:</td>
                <td><input type="checkbox" id="hobby1" value="Reading"><label for="hobby1">Reading</label>
                <input type="checkbox" id="hobby2" value="Sports"><label for="hobby2">Sports</label>
                <input type="checkbox" id="hobby3" value="Music"><label for="hobby3">Music</label></td>
            </tr>
            <tr>
                <td>Date of Birth:</td>
                <td><label for="dob"></label>
                <input style="align-items: center;" type="date" id="dob"></td>
            </tr>   
            <tr>
                <td>Upload certificate</td>
                <td><input type="file" id="certificate"></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><label for="address"></label>
                <textarea id="address" rows="4" cols="50"></textarea></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;"><input type="submit" value="Submit">
                <input type="reset" value="Reset"></td>
    </body>
    <div>ATHUL KRISHNA A   AV.SC.U4CSE25009   FIRST YEAR CSE- A</div>
</html>
