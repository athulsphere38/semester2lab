<!DOCTYPE html>
<html>
    <head>
        <title>User Login</title>
    </head>
    <body style="background-color: rgb(235, 235, 235);">    
        <h2 style="text-align: center;">USER LOGIN</h2>
        <table width="400px" height="200px" border="1" style="margin: auto;">
            <tr>
                <td>Username:</td>
                <td><label for="username"></label>
                <input style="align-items: center;" type="text" id="username"></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><label for="password"></label>
                <input style="align-items: center;" type="password" id="password"></td>
            </tr>
            <tr>
                <td colspan="2" style="text-align: center;"><input type="submit" value="Login"></td>
            </tr>
        </table>
